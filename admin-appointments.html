<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="description" content="PrimeCare Admin – manage all clinic appointments." />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PrimeCare – Admin Appointments</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="admin.css" />
  <script src="db.js"></script>
  <script src="admin-auth.js"></script>
  <script src="toast.js"></script>
</head>
<body class="admin-page">

  <aside class="admin-sidebar" id="adminSidebar">
    <div class="admin-sidebar-brand">
      <div class="brand-name">PrimeCare</div>
      <div class="brand-sub">Admin Portal</div>
    </div>
    <nav class="admin-nav">
      <a href="admin-dashboard.html"    class="admin-nav-item">         <span class="admin-nav-icon">📊</span> Dashboard</a>
      <a href="admin-appointments.html" class="admin-nav-item active">   <span class="admin-nav-icon">📅</span> Appointments</a>
      <a href="admin-patients.html"     class="admin-nav-item">         <span class="admin-nav-icon">👥</span> Patients</a>
      <a href="admin-doctors.html"      class="admin-nav-item">         <span class="admin-nav-icon">👨‍⚕️</span> Doctors</a>
      <a href="admin-messages.html"     class="admin-nav-item">         <span class="admin-nav-icon">✉️</span> Messages</a>
    </nav>
    <div class="admin-sidebar-footer">
      <a href="admin-login.html" class="admin-logout-btn" onclick="PrimeCareDB.logout()">🚪 Log Out</a>
    </div>
  </aside>

  <div class="admin-main">
    <header class="admin-topbar">
      <div class="admin-topbar-left">
        <button class="admin-hamburger" onclick="toggleSidebar()"><span></span><span></span><span></span></button>
        <h1 class="admin-page-title">Appointments</h1>
      </div>
      <div class="admin-topbar-right">
        <div class="admin-user-info">
          <div class="admin-avatar">AD</div>
          <span>Admin</span>
        </div>
      </div>
    </header>

    <main class="admin-content">
      <nav class="breadcrumb" aria-label="Breadcrumb"><ol class="breadcrumb-list"><li class="breadcrumb-item"><a href="admin-dashboard.html">Admin</a></li><li class="breadcrumb-sep">›</li><li class="breadcrumb-item active">Appointments</li></ol></nav>
      <section class="admin-section">

        <!-- Filter Bar -->
        <div class="admin-filter-bar">
          <select class="admin-select" id="statusFilter" onchange="filterTable()">
            <option value="all">All Status</option>
            <option value="pending">Pending</option>
            <option value="complete">Completed</option>
            <option value="cancelled">Cancelled</option>
          </select>
          <select class="admin-select" id="doctorFilter" onchange="filterTable()">
            <option value="all">All Doctors</option>
            <option value="buena">Dr. Buena</option>
            <option value="santos">Dr. Santos</option>
            <option value="gole">Dr. Gole</option>
          </select>
          <div class="admin-search">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="M21 21l-4.35-4.35"/>
            </svg>
            <input type="text" placeholder="Search patient or ID..." id="searchInput" oninput="filterTable()" />
          </div>
        </div>

        <!-- Table -->
        <div class="admin-table-wrapper">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Appt ID</th>
                <th>Patient</th>
                <th>Doctor</th>
                <th>Service</th>
                <th>Date & Time</th>
                <th>Mode</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="apptTableBody"></tbody>
          </table>
        </div>

        <!-- Pagination -->
        <div class="pagination" id="apptPagination"></div>

      </section>
    </main>
  </div>

  <!-- Confirm / Cancel Modal -->
  <div class="modal-overlay" id="confirmModal">
    <div class="modal-box" style="max-width:380px; text-align:center;">
      <div class="modal-header" style="justify-content:center; position:relative;">
        <h3 id="modalTitle">Confirm Appointment</h3>
        <button class="modal-close" onclick="closeModal('confirmModal')" style="position:absolute;right:0;">✕</button>
      </div>
      <p id="modalMsg" style="font-size:0.9rem;color:#4a6fa5;font-weight:600;margin:12px 0 20px;"></p>
      <div class="modal-btn-row">
        <button class="btn btn-hero-outline modal-btn" onclick="closeModal('confirmModal')">Go Back</button>
        <button class="btn btn-primary modal-btn" id="modalActionBtn">Confirm</button>
      </div>
    </div>
  </div>

  <!-- Back to Top -->
  <button class="back-to-top" id="backToTop" onclick="scrollToTop()" aria-label="Back to top">↑</button>

  <script>

    /* ── Data ──────────────────────────────────────────── */
    var appointments = [
      { id: "APT-2026-0021", patient: "Adrian Lei Frio", doctor: "Dr. Buena",  service: "Orthopedics",          date: "Feb 10, 2026", time: "10:00 AM", mode: "Face-to-Face",     status: "pending"   },
      { id: "APT-2026-0020", patient: "Maria Clara",     doctor: "Dr. Santos", service: "General Consultation", date: "Feb 10, 2026", time: "9:00 AM",  mode: "Face-to-Face",     status: "complete"  },
      { id: "APT-2026-0019", patient: "Jose Reyes",      doctor: "Dr. Gole",   service: "Dental Care",          date: "Feb 9, 2026",  time: "2:00 PM",  mode: "Face-to-Face",     status: "complete"  },
      { id: "APT-2026-0018", patient: "Ana Santos",      doctor: "Dr. Buena",  service: "Orthopedics",          date: "Feb 9, 2026",  time: "11:00 AM", mode: "Teleconsultation", status: "cancelled" },
      { id: "APT-2026-0017", patient: "Pedro Cruz",      doctor: "Dr. Santos", service: "Laboratory Tests",     date: "Feb 8, 2026",  time: "3:00 PM",  mode: "Face-to-Face",     status: "pending"   },
      { id: "APT-2026-0016", patient: "Liza Reyes",      doctor: "Dr. Gole",   service: "Dental Care",          date: "Feb 7, 2026",  time: "1:00 PM",  mode: "Face-to-Face",     status: "complete"  },
      { id: "APT-2026-0015", patient: "Carlo Mendoza",   doctor: "Dr. Santos", service: "Physical Therapy",     date: "Feb 6, 2026",  time: "10:00 AM", mode: "Face-to-Face",     status: "complete"  },
      { id: "APT-2026-0014", patient: "Rosa Garcia",     doctor: "Dr. Buena",  service: "Orthopedics",          date: "Feb 5, 2026",  time: "9:00 AM",  mode: "Face-to-Face",     status: "complete"  },
      { id: "APT-2026-0013", patient: "Miguel Torres",   doctor: "Dr. Santos", service: "General Consultation", date: "Feb 4, 2026",  time: "2:00 PM",  mode: "Teleconsultation", status: "pending"   },
    ];

    var APPT_PER_PAGE = 5;
    var apptPage      = 1;
    var apptFiltered  = appointments.slice();

    /* ── Render Table ──────────────────────────────────── */
    function renderTable(data, page) {
      apptPage     = page || 1;
      apptFiltered = data;

      var tbody = document.getElementById("apptTableBody");
      var start = (apptPage - 1) * APPT_PER_PAGE;
      var paged = data.slice(start, start + APPT_PER_PAGE);

      if (data.length === 0) {
        tbody.innerHTML = "<tr><td colspan='8' style='text-align:center;color:#4a6fa5;padding:24px;font-weight:600;'>No appointments found.</td></tr>";
        document.getElementById("apptPagination").innerHTML = "";
        return;
      }

      var rows = "";
      for (var i = 0; i < paged.length; i++) {
        var a  = paged[i];
        var bc = a.status === "complete"  ? "badge-complete"  :
                 a.status === "pending"   ? "badge-pending"   : "badge-cancelled";
        var bt = a.status === "complete"  ? "Completed"       :
                 a.status === "pending"   ? "Pending"         : "Cancelled";

        var actionCell = "";
        if (a.status === "pending") {
          actionCell = "<button class='admin-btn-confirm' onclick='openAction(this)'>Confirm</button> " +
                       "<button class='admin-btn-cancel'  onclick='openAction(this)'>Cancel</button>";
        } else {
          actionCell = "<button class='admin-btn-view'>View</button>";
        }

        rows += "<tr>";
        rows += "<td>" + a.id      + "</td>";
        rows += "<td>" + a.patient + "</td>";
        rows += "<td>" + a.doctor  + "</td>";
        rows += "<td>" + a.service + "</td>";
        rows += "<td>" + a.date + " " + a.time + "</td>";
        rows += "<td>" + a.mode    + "</td>";
        rows += "<td><span class='badge " + bc + "'>" + bt + "</span></td>";
        rows += "<td>" + actionCell + "</td>";
        rows += "</tr>";
      }
      tbody.innerHTML = rows;
      renderApptPagination(data.length, apptPage);
    }

    /* ── Pagination ────────────────────────────────────── */
    function renderApptPagination(total, page) {
      var pages = Math.ceil(total / APPT_PER_PAGE);
      var el    = document.getElementById("apptPagination");
      if (!el) return;
      if (pages <= 1) { el.innerHTML = ""; return; }

      var html = "";
      html += "<button class='pg-btn' onclick='changeApptPage(" + (page - 1) + ")'" + (page === 1 ? " disabled" : "") + ">← Prev</button>";
      for (var i = 1; i <= pages; i++) {
        html += "<button class='pg-btn pg-num" + (i === page ? " active" : "") + "' onclick='changeApptPage(" + i + ")'>" + i + "</button>";
      }
      html += "<button class='pg-btn' onclick='changeApptPage(" + (page + 1) + ")'" + (page === pages ? " disabled" : "") + ">Next →</button>";
      html += "<span class='pg-info'>Page " + page + " of " + pages + " &nbsp;·&nbsp; " + total + " appointments</span>";
      el.innerHTML = html;
    }

    function changeApptPage(n) {
      var pages = Math.ceil(apptFiltered.length / APPT_PER_PAGE);
      if (n < 1 || n > pages) return;
      renderTable(apptFiltered, n);
    }

    /* ── Filter ────────────────────────────────────────── */
    function filterTable() {
      var status = document.getElementById("statusFilter").value;
      var doctor = document.getElementById("doctorFilter").value;
      var search = document.getElementById("searchInput").value.toLowerCase();

      var filtered = [];
      for (var i = 0; i < appointments.length; i++) {
        var a = appointments[i];
        var mS = status === "all" || a.status === status;
        var mD = doctor === "all" || a.doctor.toLowerCase().indexOf(doctor) > -1;
        var mQ = a.patient.toLowerCase().indexOf(search) > -1 || a.id.toLowerCase().indexOf(search) > -1;
        if (mS && mD && mQ) filtered.push(a);
      }
      renderTable(filtered, 1);
    }

    /* ── Confirm / Cancel Modal ────────────────────────── */
    var actionId   = "";
    var actionType = "";

    function openAction(btn) {
      var row  = btn.parentElement.parentElement;
      var type = btn.classList.contains("admin-btn-confirm") ? "confirm" : "cancel";
      actionId   = row.cells[0].textContent;
      actionType = type;

      document.getElementById("modalTitle").textContent = type === "confirm" ? "Confirm Appointment" : "Cancel Appointment";
      document.getElementById("modalMsg").textContent   = type === "confirm"
        ? "Are you sure you want to confirm this appointment?"
        : "Are you sure you want to cancel this appointment?";

      var modalBtn = document.getElementById("modalActionBtn");
      modalBtn.textContent       = type === "confirm" ? "Yes, Confirm" : "Yes, Cancel";
      modalBtn.style.background  = type === "cancel"  ? "#f08080"      : "";
      modalBtn.style.color       = type === "cancel"  ? "white"        : "";
      modalBtn.onclick           = doAction;
      openModal("confirmModal");
    }

    function doAction() {
      for (var i = 0; i < appointments.length; i++) {
        if (appointments[i].id === actionId) {
          appointments[i].status = actionType === "confirm" ? "complete" : "cancelled";
          if (actionType === "confirm") showToast("success", "Confirmed!", "Appointment has been confirmed.");
          else                          showToast("warning", "Cancelled",  "Appointment has been cancelled.");
          break;
        }
      }
      closeModal("confirmModal");
      filterTable();
    }

    /* ── Utilities ─────────────────────────────────────── */
    requireAdmin();

    function toggleSidebar() {
      document.getElementById("adminSidebar").classList.toggle("collapsed");
    }

    function openModal(id)  { document.getElementById(id).classList.add("open"); }
    function closeModal(id) { document.getElementById(id).classList.remove("open"); }

    document.querySelectorAll(".modal-overlay").forEach(function(o) {
      o.addEventListener("click", function(e) {
        if (e.target === o) closeModal(o.id);
      });
    });

    function scrollToTop() { window.scrollTo({ top: 0, behavior: "smooth" }); }
    var btt = document.getElementById("backToTop");
    if (btt) {
      window.addEventListener("scroll", function() {
        btt.classList.toggle("visible", window.scrollY > 400);
      }, { passive: true });
    }

    /* ── Init ──────────────────────────────────────────── */
    renderTable(appointments, 1);

  </script>

</body>
</html>
