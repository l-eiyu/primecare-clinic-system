<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="description" content="PrimeCare Medical Clinic Admin Portal login." />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PrimeCare – Admin Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="db.js"></script>
  <script src="toast.js"></script>
</head>
<body class="login-page">

  <main class="login-main">

    <div class="auth-top-image">
      <img src="assets/clinic-bg.jpg" alt="PrimeCare Medical Clinic" class="auth-top-img" />
      <div class="auth-top-overlay"></div>
    </div>

    <div class="login-logo">
      <h1>PrimeCare</h1>
      <p class="subtitle">Admin Portal</p>
    </div>

    <div class="login-card">
      <h2>Admin Log In</h2>
      <p class="card-sub">Enter your admin credentials</p>

      <div class="login-form">

        <div class="alert-error" id="errorAlert" style="display:none;">
          Invalid admin credentials. Please try again.
          <button onclick="document.getElementById('errorAlert').style.display='none'">✕</button>
        </div>

        <div class="input-group">
          <input type="text" class="input-field" id="adminUser" placeholder="Admin Username" />
        </div>

        <div class="input-group">
          <input type="password" class="input-field" id="adminPass" placeholder="Password" />
          <span class="eye-icon" onclick="togglePw()">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
          </span>
        </div>

        <div class="form-options">
          <label class="remember-me"><input type="checkbox" /> Remember me</label>
        </div>

        <button class="btn btn-white" onclick="adminLogin()">Log In</button>

      </div>
    </div>

    <div class="login-footer" style="margin-top:16px;">
      <p><span class="line"></span> Patient portal? <span class="line"></span></p>
      <a href="login.html" class="btn btn-primary">Go to Patient Login</a>
    </div>

  </main>

  <footer class="inner-footer">
    <p>© 2026 PrimeCare Medical Clinic. All rights reserved.</p>
  </footer>

  <script>
    function togglePw() {
      const el = document.getElementById('adminPass');
      el.type = el.type === 'password' ? 'text' : 'password';
    }

    // If already logged in as admin, go to dashboard
    var existing = PrimeCareDB.getCurrentUser();
    if (existing && existing.role === 'admin') {
      window.location.href = 'admin-dashboard.html';
    }

    function adminLogin() {
      var user  = document.getElementById('adminUser').value.trim();
      var pass  = document.getElementById('adminPass').value.trim();
      var err   = document.getElementById('errorAlert');
      var userEl = document.getElementById('adminUser');
      var passEl = document.getElementById('adminPass');

      if (!user || !pass) {
        err.style.display = 'flex';
        userEl.classList.add('error');
        passEl.classList.add('error');
        return;
      }

      // Use real DB - check role is admin
      var result = PrimeCareDB.loginUser(user, pass);

      if (result.success && result.user.role === 'admin') {
        err.style.display = 'none';
        userEl.classList.remove('error');
        passEl.classList.remove('error');
        showToast('success', 'Welcome, Admin!', 'Redirecting to dashboard...', 1200);
        setTimeout(function() { window.location.href = 'admin-dashboard.html'; }, 1000);
      } else {
        err.style.display = 'flex';
        userEl.classList.add('error');
        passEl.classList.add('error');
      }
    }
  </script>

</body>
</html>
